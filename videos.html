<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>心动档案站 - 视频记录</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-aura bg-aura-one"></div>
  <div class="bg-aura bg-aura-two"></div>
  <div class="bg-stars" aria-hidden="true"></div>

  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-badge" aria-hidden="true">★</span>
      <span>心动档案站</span>
    </a>
    <nav class="top-nav" aria-label="主导航">
      <details class="menu-dropdown">
        <summary class="menu-toggle">
          <span class="menu-icon" aria-hidden="true">≡</span>
          <span>导航</span>
          <span class="menu-caret" aria-hidden="true">▾</span>
        </summary>
        <div class="menu-panel">
          <a href="index.html"><span aria-hidden="true">⌂</span><span>首页</span></a>
          <a href="messages.html"><span aria-hidden="true">✉</span><span>每日一句</span></a>
          <a class="active" href="videos.html"><span aria-hidden="true">▶</span><span>视频记录</span></a>
          <a href="albums.html"><span aria-hidden="true">▦</span><span>二次元相册</span></a>
        </div>
      </details>
    </nav>
  </header>

  <main class="page-shell">
    <section class="hero-block hero-compact">
      <p class="hero-kicker">Memory Video Clip</p>
      <h1>视频与回忆片段</h1>
      <p class="hero-sub">支持 YouTube 链接和 mp4 直链，不支持的链接会保留跳转入口。</p>
    </section>

    <section class="panel">
      <form id="videoForm" class="form-grid">
        <label class="full">选择视频文件<input id="videoFile" type="file" accept="video/*,.mp4,.webm,.ogg,.mov,.m4v" required></label>
        <p class="full card-meta">上传后文件会保存到当前目录下的 `videos/` 文件夹，页面展示也从该文件夹读取。</p>
        <div class="actions full">
          <button class="btn-main" type="submit">上传视频</button>
          <button class="btn-sub" type="button" id="videoReset">清空</button>
        </div>
      </form>
      <div id="videoList" class="video-grid"></div>
    </section>
  </main>

  <footer class="site-foot">视频文件保存到当前目录 `videos/` 文件夹。</footer>
  <script src="backend-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
