<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>和雪一起的日常 - 首页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">
  <div class="bg-aura bg-aura-one"></div>
  <div class="bg-aura bg-aura-two"></div>
  <div class="bg-stars" aria-hidden="true"></div>

  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-badge" aria-hidden="true">★</span>
      <span>和雪一起的日常</span>
    </a>
    <nav class="top-nav" aria-label="主导航">
      <details class="menu-dropdown">
        <summary class="menu-toggle">
          <span class="menu-icon" aria-hidden="true">≡</span>
          <span>导航</span>
          <span class="menu-caret" aria-hidden="true">▾</span>
        </summary>
        <div class="menu-panel">
          <a class="active" href="index.html"><span aria-hidden="true">⌂</span><span>首页</span></a>
          <a href="messages.html"><span aria-hidden="true">✉</span><span>想对雪说的话</span></a>
        </div>
      </details>
    </nav>
  </header>

  <main class="page-shell">
    <section class="home-carousel" aria-label="首页照片轮播">
      <div class="carousel-track" id="homeCarouselTrack">
        <article class="carousel-slide active">
          <img src="photos/1.jpg" alt="相册照片 1" loading="lazy">
          <div class="carousel-caption">
            <h2>你一笑，今天就变成了限定版好天气。</h2>
          </div>
        </article>
        <article class="carousel-slide">
          <img src="photos/2.jpg" alt="相册照片 2" loading="lazy">
          <div class="carousel-caption">
            <h2>和你并肩走的路，连风都变得温柔。</h2>
          </div>
        </article>
        <article class="carousel-slide">
          <img src="photos/3.jpg" alt="相册照片 3" loading="lazy">
          <div class="carousel-caption">
            <h2>想你的时候，连平常的一天都会发光。</h2>
          </div>
        </article>
        <article class="carousel-slide">
          <img src="photos/4.jpg" alt="相册照片 4" loading="lazy">
          <div class="carousel-caption">
            <h2>你在身边，日常就有了心动的注脚。</h2>
          </div>
        </article>
        <article class="carousel-slide">
          <img src="photos/5.jpg" alt="相册照片 5" loading="lazy">
          <div class="carousel-caption">
            <h2>我把喜欢藏进每个细节，你都会看到。</h2>
          </div>
        </article>
        <article class="carousel-slide">
          <img src="photos/6.jpg" alt="相册照片 6" loading="lazy">
          <div class="carousel-caption">
            <h2>往后的每一帧，都想和你一起慢慢拍完。</h2>
          </div>
        </article>
      </div>
      <button class="carousel-btn prev" type="button" id="carouselPrev" aria-label="上一张">‹</button>
      <button class="carousel-btn next" type="button" id="carouselNext" aria-label="下一张">›</button>
      <div class="carousel-dots" id="carouselDots" aria-label="轮播指示"></div>
    </section>

    <section class="hero-block">
      <p class="hero-kicker">和雪一起的日常</p>
      <h1>把和雪的日常，存成可回看的小宇宙</h1>
      <div class="hero-tags">
        <span>写给雪的话</span>
      </div>
    </section>

    <section class="entry-grid" aria-label="页面入口">
      <a class="entry-card" href="messages.html">
        <p class="entry-icon" aria-hidden="true">✉</p>
        <h2>想对雪说的话</h2>
        <p id="homeLatestMessageText">记录今天想对雪说的话和你的心情。</p>
      </a>
    </section>

    <section class="stat-grid" aria-label="数据统计">
      <article class="stat-card"><p>写给雪的话</p><strong id="statMessages">0</strong></article>
      <article class="stat-card"><p>最近更新</p><strong id="statUpdated">-</strong></article>
    </section>

    <section class="home-video-section" aria-label="生日快乐视频">
      <article class="home-video-card">
        <div class="home-video-head">
          <p class="home-video-kicker">SPECIAL CLIP</p>
          <h2>生日记录</h2>
        </div>
        <div class="home-video-shell">
          <video
            id="homeBirthdayVideo"
            class="home-video-player"
            controls
            preload="none"
            playsinline
          >
            <source data-src="videos/shengrikuaile.mp4" type="video/mp4">
            你的浏览器暂不支持视频播放。
          </video>
        </div>
      </article>
    </section>
  </main>

  <a class="figure-float-btn" id="figureFloatBtn" href="albums.html" aria-label="播放我饿了语音">
    <img
      id="figureFloatImage"
      class="figure-float-image"
      src="photos/fuluoluo.png?v=202603142055"
      alt="福洛落点"
      decoding="async"
      fetchpriority="low"
    >
    <span class="figure-float-tip" id="figureFloatTip">今天有奶茶吗？</span>
  </a>
  <audio id="figureFloatAudio" preload="auto">
    <source src="videos/woele.mp3" type="audio/mpeg">
  </audio>

  <script src="app.js"></script>
</body>
</html>
